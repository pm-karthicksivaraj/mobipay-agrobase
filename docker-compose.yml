# ============================================
# Agrobase V3 — Docker Compose (Development + Production)
# MobiPay AgroSys Limited
# ============================================

services:
  # --- PostgreSQL (Production Database) ---
  postgres:
    image: postgres:16-alpine
    container_name: agrobase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agrobase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agrobase_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-agrobase_v3}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agrobase} -d ${POSTGRES_DB:-agrobase_v3}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis (Rate Limiting + Caching) ---
  redis:
    image: redis:7-alpine
    container_name: agrobase-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Next.js Application ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrobase-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-agrobase}:${POSTGRES_PASSWORD:-agrobase_dev_pass}@postgres:5432/${POSTGRES_DB:-agrobase_v3}?schema=public
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Caddy (Reverse Proxy + Auto HTTPS) ---
  caddy:
    image: caddy:2-alpine
    container_name: agrobase-caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config: