name: agrobase_mobile
description: "Agrobase V3 — Offline-first agritech platform for East Africa"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ─── Networking ───
  http: ^1.2.2
  connectivity_plus: ^6.1.1

  # ─── Local Database (offline-first) ───
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # ─── Background Sync ───
  workmanager: ^0.5.2

  # ─── State Management ───
  provider: ^6.1.2
  shared_preferences: ^2.3.4

  # ─── Navigation ───
  go_router: ^14.8.1

  # ─── UI ───
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.2
  pull_to_refresh_flutter3: ^2.0.2

  # ─── Utilities ───
  logger: ^2.5.0
  share_plus: ^10.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
